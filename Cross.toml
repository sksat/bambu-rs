# `cross` config for the release workflow's Linux targets. Pinning the released
# 0.2.5 images (NOT the moving :edge) keeps the glibc floor old and
# host-independent: the gnu images are Ubuntu 16.04 = glibc 2.23, so the
# binaries run on old systems. musl images produce fully static output.

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:0.2.5"

[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:0.2.5"

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:0.2.5"

[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:0.2.5"
