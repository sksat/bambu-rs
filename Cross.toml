# `cross` config for the release workflow's Linux targets. Pinning the released
# 0.2.5 images (NOT the moving :edge) keeps the glibc floor old and
# host-independent: the gnu images are Ubuntu 16.04 = glibc 2.23, so the
# binaries run on old systems. musl images produce fully static output.
#
# The release build enables the `license-notice` feature, whose build.rs shells
# out to `cargo-about` — which runs on the (x86_64) build host *inside* the
# container, even for aarch64 targets. So a single global pre-build fetches a
# pinned, checksum-verified cargo-about into every target container. Keep the
# version (and hash) in sync with the host install in .github/workflows/release.yml.
[build]
pre-build = [
    "curl -fsSL -o /tmp/cargo-about.tar.gz https://github.com/EmbarkStudios/cargo-about/releases/download/0.9.0/cargo-about-0.9.0-x86_64-unknown-linux-musl.tar.gz && echo '7a1a1bfb3ae3b6feabe9e1d6147a6b34b85bd0339bfd8b0ec11b312dee10d99a  /tmp/cargo-about.tar.gz' | sha256sum -c - && tar -xzf /tmp/cargo-about.tar.gz -C /usr/local/bin --strip-components=1 --wildcards '*/cargo-about' && rm -f /tmp/cargo-about.tar.gz",
]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:0.2.5"

[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:0.2.5"

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:0.2.5"

[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:0.2.5"
