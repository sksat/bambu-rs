name: CI

on:
  push:
    # Tags too, so the full lint/test/frontend/msrv suite gates the exact commit
    # a release is built from (release.yml builds binaries; this proves them).
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      # dtolnay/rust-toolchain publishes no minor.patch release tags (only the
      # moving `stable` branch), so pin to its commit SHA for reproducibility.
      # Toolchain version is pinned by rust-toolchain.toml (1.96.0); keep this in
      # sync with that file.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, 2026-03-27
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Format
        run: cargo fmt --all -- --check
      # `dashboard,ts-rs` is every feature EXCEPT `license-notice` (release-only: its
      # build.rs gathers every dependency's license at build time — see Cargo.toml).
      # Avoid `--all-features` so CI skips that build-time cost.
      - name: Clippy
        run: cargo clippy --all-targets --features dashboard,ts-rs -- -D warnings

  # Test the meaningful feature combinations, not just --all-features — a
  # library-only consumer builds with default-features off, and the server /
  # dashboard layers gate real code, so each must compile and pass on its own.
  # (`server` implies `cli`, `dashboard` implies `server`; the bin needs `cli`.)
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lib-only
            features: "--no-default-features"
          - name: cli
            features: "--no-default-features --features cli"
          - name: default
            features: ""
          - name: dashboard
            features: "--no-default-features --features dashboard"
          # Every feature except the release-only `license-notice` (its build.rs gathers
          # all dependency licenses at build time, so it's not exercised in CI — see Cargo.toml).
          - name: full
            features: "--features dashboard,ts-rs"
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, 2026-03-27
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.name }}
      - name: Test (${{ matrix.name }})
        run: cargo test ${{ matrix.features }}

  # The dashboard frontend: typecheck, build, prove the ts-rs bindings are still
  # in sync with the Rust DTOs, then run the Playwright E2E (which itself builds
  # the `bambu` binary with --features dashboard, builds the SPA, and drives
  # `serve --fake`). Needs both the Rust toolchain and Node/pnpm.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, 2026-03-27
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: "11.6.0"
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      # The committed bindings must match what ts-rs generates from the Rust DTOs,
      # so the frontend can't silently drift from the API contract.
      - name: ts-rs bindings are in sync
        run: |
          pnpm gen:types
          git diff --exit-code src/bindings \
            || { echo "::error::ts-rs bindings are stale — run 'pnpm -C web gen:types' and commit"; exit 1; }
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E
        run: pnpm e2e

  # Enforce the declared MSRV (Cargo.toml `rust-version`) — and prove this job is
  # actually exercising it. The MSRV is read FROM Cargo.toml (single source of
  # truth, no drift), and a guard asserts the active rustc really is that version
  # before building, so a misconfiguration (e.g. rust-toolchain.toml's 1.96.0 pin
  # leaking past RUSTUP_TOOLCHAIN) fails loudly instead of silently passing on
  # the wrong toolchain.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          v="$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([0-9.]+)".*/\1/')"
          [ -n "$v" ] || { echo "::error::could not read rust-version from Cargo.toml"; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "MSRV from Cargo.toml: $v"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, 2026-03-27
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2.9.1
      # RUSTUP_TOOLCHAIN overrides rust-toolchain.toml (which pins 1.96.0) so cargo
      # uses the MSRV; the guard then proves it actually did.
      - name: Guard — active rustc must be the declared MSRV
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
        run: |
          want="${{ steps.msrv.outputs.version }}"
          got="$(rustc --version | awk '{print $2}')"
          echo "declared MSRV=$want  active rustc=$got"
          [ "$got" = "$want" ] || { echo "::error::msrv job is NOT on the MSRV ($got != $want)"; exit 1; }
      # Compiles lib + bins + tests + examples on the MSRV and runs the tests —
      # catches any accidental use of a feature newer than the declared floor.
      - name: Build + test on MSRV
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
        # Not --all-features: license-notice is release-only (build-time license gathering).
        run: cargo test --features dashboard,ts-rs
