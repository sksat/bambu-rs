name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      # dtolnay/rust-toolchain publishes no minor.patch release tags (only the
      # moving `stable` branch), so pin to its commit SHA for reproducibility.
      # Toolchain version is pinned by rust-toolchain.toml (1.96.0); keep this in
      # sync with that file.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, 2026-03-27
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features

  # Enforce the declared MSRV (Cargo.toml `rust-version`). RUSTUP_TOOLCHAIN
  # overrides rust-toolchain.toml (which pins 1.96.0) so this builds on the floor.
  msrv:
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: "1.88.0"
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, 2026-03-27
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2.9.1
      # Compiles lib + bins + tests + examples on the MSRV and runs the tests —
      # catches any accidental use of a feature newer than 1.85.1.
      - name: Build + test on MSRV
        run: cargo test --all-features
